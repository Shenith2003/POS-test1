<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enterprise POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/print.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
    />
  </head>
  <body
    class="h-full min-h-screen bg-slate-50 text-slate-900 antialiased transition-colors dark:bg-slate-950 dark:text-slate-100"
  >
    <div id="app-root" class="flex min-h-full flex-col">
      <header
        class="sticky top-0 z-40 border-b border-slate-200 bg-white/95 backdrop-blur dark:border-slate-800 dark:bg-slate-900/95 print:hidden"
      >
        <div
          class="mx-auto flex max-w-[1600px] flex-wrap items-center justify-between gap-3 px-4 py-3 sm:px-6"
        >
          <div class="flex items-center gap-3">
            <div
              class="flex h-10 w-10 items-center justify-center rounded-xl bg-indigo-600 text-lg font-bold text-white shadow-sm"
            >
              POS
            </div>
            <div>
              <h1 class="text-lg font-semibold tracking-tight sm:text-xl">
                Nexus Retail POS
              </h1>
              <p class="text-xs text-slate-500 dark:text-slate-400">
                Inventory · Sales · Reports
              </p>
            </div>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <button
              type="button"
              id="btn-theme-toggle"
              class="inline-flex min-h-12 min-w-12 items-center justify-center rounded-xl border border-slate-200 bg-white px-3 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700"
              aria-label="Toggle dark mode"
            >
              <span class="dark:hidden">Dark</span>
              <span class="hidden dark:inline">Light</span>
            </button>
          </div>
        </div>
        <nav
          class="mx-auto flex max-w-[1600px] gap-1 border-t border-slate-100 px-2 pb-2 pt-1 dark:border-slate-800 sm:px-4"
          aria-label="Main"
        >
          <button
            type="button"
            data-tab="pos"
            class="tab-btn min-h-12 flex-1 rounded-xl px-4 text-sm font-semibold transition sm:flex-none sm:px-6"
          >
            Point of Sale
          </button>
          <button
            type="button"
            data-tab="inventory"
            class="tab-btn min-h-12 flex-1 rounded-xl px-4 text-sm font-semibold transition sm:flex-none sm:px-6"
          >
            Inventory
          </button>
          <button
            type="button"
            data-tab="reports"
            class="tab-btn min-h-12 flex-1 rounded-xl px-4 text-sm font-semibold transition sm:flex-none sm:px-6"
          >
            Sales Report
          </button>
        </nav>
      </header>

      <main class="mx-auto w-full max-w-[1600px] flex-1 px-4 py-6 sm:px-6 print:hidden">
        <section id="view-pos" class="view-panel" aria-hidden="false">
          <div
            class="flex flex-col gap-6 lg:grid lg:grid-cols-[1fr_minmax(280px,360px)] lg:items-start"
          >
            <div class="min-w-0 space-y-4">
              <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
                <div class="flex-1">
                  <label
                    for="pos-search"
                    class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-500 dark:text-slate-400"
                    >Search name or barcode ID</label
                  >
                  <input
                    id="pos-search"
                    type="search"
                    autocomplete="off"
                    placeholder="Type product name or scan ID…"
                    class="min-h-12 w-full rounded-xl border border-slate-200 bg-white px-4 text-base shadow-sm outline-none ring-indigo-500/0 transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20 dark:border-slate-700 dark:bg-slate-900 dark:focus:border-indigo-400"
                  />
                </div>
              </div>
              <div id="pos-category-chips" class="flex flex-wrap gap-2"></div>
              <div
                id="pos-product-grid"
                class="grid grid-cols-[repeat(auto-fill,minmax(140px,1fr))] gap-3 sm:grid-cols-[repeat(auto-fill,minmax(160px,1fr))]"
              ></div>
            </div>
            <aside
              id="cart-aside"
              class="lg:sticky lg:top-28 lg:max-h-[calc(100vh-7rem)] lg:overflow-y-auto"
            >
              <div id="cart-panel-root"></div>
            </aside>
          </div>
        </section>

        <section
          id="view-inventory"
          class="view-panel hidden"
          aria-hidden="true"
        >
          <div id="dashboard-root" class="space-y-6"></div>
        </section>

        <section id="view-reports" class="view-panel hidden" aria-hidden="true">
          <div id="reports-root" class="space-y-6"></div>
        </section>
      </main>

      <footer
        class="border-t border-slate-200 bg-white py-4 text-center text-xs text-slate-500 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-400 print:hidden"
      >
        Local-only demo · Data stored in this browser
      </footer>
    </div>

    <!-- Receipt: visible only when printing (see print.css) -->
    <div id="receipt-root" class="receipt-shell" aria-hidden="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
